<!--
================================================================================
  index.html — Dashboard Page Structure
================================================================================

  WHAT THIS FILE DOES:
  ─────────────────────────────────────────────────────────
  Defines the structure and content of the dashboard page.
  No colors, no logic — only layout and element definitions.

    Colors / visual styling  →  style.css
    Live data / interactivity  →  dashboard.js
    Data source / server  →  dashboard.py

  WHAT "STRUCTURE" MEANS HERE:
  ─────────────────────────────────────────────────────────
  Every sensor card on the screen is defined here as an HTML
  element. The id attribute on each .value span is the bridge
  between this file and dashboard.js — JS finds elements by
  id and writes the live number into them.

  HOW TO ADD A NEW SENSOR CARD:
  ─────────────────────────────────────────────────────────
  1. Copy an existing <div class="card"> block
  2. Change the .label text to the sensor name
  3. Give the .value span a unique id (e.g. id="motor_temp")
  4. Change the .unit text (e.g. °C, A, km/h)
  5. In dashboard.js, add: update('motor_temp', data.motor_temp)
     (the id here must match step 3 exactly)

  HOW TO ADD A NEW ROW OF CARDS:
  ─────────────────────────────────────────────────────────
  Wrap your new cards in a new <section class="card-grid">
  block. Each section becomes its own row. The number of
  cards per row is controlled by .card-grid in style.css.

  FLASK TEMPLATING NOTE:
  ─────────────────────────────────────────────────────────
  The {{ url_for(...) }} syntax is a Flask/Jinja2 template tag.
  It generates the correct file path to static assets (CSS, JS)
  relative to the server. Do NOT replace these with plain
  relative paths like "style.css" — they won't work when
  served through Flask.

  SCRIPT LOADING ORDER (important):
  ─────────────────────────────────────────────────────────
  Scripts are loaded at the BOTTOM of <body>, after all HTML.
  This ensures the page elements exist in the DOM before
  dashboard.js tries to find them by id. If scripts were in
  <head>, JS would run before the elements exist and fail silently.
  Socket.IO must also load BEFORE dashboard.js since dashboard.js
  depends on the io() function it provides.

  TROUBLESHOOTING:
  ─────────────────────────────────────────────────────────
  Card not appearing      → check the .card div is inside
                            a <section class="card-grid">
  Value never updates     → confirm the id here matches the
                            id used in update() in dashboard.js
  CSS not applying        → confirm the url_for path is correct
                            and Flask is running
  Page loads but no data  → JS and CSS issue, not HTML
                            check dashboard.js and dashboard.py
================================================================================
-->

<!DOCTYPE html>  <!-- Tells the browser this is HTML5 (modern standard) -->
<html lang="en"> <!-- lang="en" helps screen readers and search engines -->
<head>
    <meta charset="UTF-8"> <!-- Character encoding: supports all standard symbols including ° -->
    <title>FSAE VCU Telemetry</title> <!-- Text shown in the browser tab -->

    <!-- Load stylesheet via Flask's url_for — generates the correct path to /static/style.css.
         Do not replace with a plain href="style.css" — it won't resolve through Flask. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- ── Header ──────────────────────────────────────────────────────────────
         Top bar with the dashboard title and connection status.
         #connection-status starts as "Connecting..." and is updated
         dynamically by setStatus() in dashboard.js.
         Style lives in style.css under header, header h1, #connection-status  -->
    <header>
        <h1>VCU Capstone — Telemetry Dashboard</h1>
        <p id="connection-status">Connecting...</p>
                                  <!-- ↑ dashboard.js targets this id to show
                                         "Connected" or "Disconnected"         -->
    </header>

    <main>

        <!-- ── Wheel Speed Cards ───────────────────────────────────────────────
             One card per wheel corner. FL/FR = front, RL/RR = rear.
             Each .value span has a unique id — dashboard.js writes RPM
             readings into these via update('wheel_fl', data.wheel_speed_fl).
             The "--" is the placeholder shown before any data arrives.       -->
        <section class="card-grid">

            <div class="card">
                <span class="label">FL Wheel</span>
                <span class="value" id="wheel_fl">--</span>  <!-- Front Left  -->
                <span class="unit">RPM</span>
            </div>

            <div class="card">
                <span class="label">FR Wheel</span>
                <span class="value" id="wheel_fr">--</span>  <!-- Front Right -->
                <span class="unit">RPM</span>
            </div>

            <div class="card">
                <span class="label">RL Wheel</span>
                <span class="value" id="wheel_rl">--</span>  <!-- Rear Left   -->
                <span class="unit">RPM</span>
            </div>

            <div class="card">
                <span class="label">RR Wheel</span>
                <span class="value" id="wheel_rr">--</span>  <!-- Rear Right  -->
                <span class="unit">RPM</span>
            </div>

        </section>

        <!-- ── Battery & Controls Cards ────────────────────────────────────────
             Second row of cards for electrical and driver input data.
             This section only has 3 cards — the fourth column will be
             empty. Add a fourth card here or adjust the column count in
             style.css (.card-grid) if you want a full row.                   -->
        <section class="card-grid">

            <div class="card">
                <span class="label">Battery Voltage</span>
                <span class="value" id="battery_voltage">--</span>
                <span class="unit">V</span>
            </div>

            <div class="card">
                <span class="label">Pedal Position</span>
                <span class="value" id="pedal_position">--</span>
                <span class="unit">%</span>   <!-- 0% = no input, 100% = full throttle -->
            </div>

            <div class="card">
                <span class="label">Steering Angle</span>
                <span class="value" id="steering_angle">--</span>
                <span class="unit">°</span>   <!-- Degrees from center -->
            </div>

            <!-- ADD A FOURTH CARD HERE to fill the row, for example:
            <div class="card">
                <span class="label">Motor Temp</span>
                <span class="value" id="motor_temp">- -</span>
                <span class="unit">°C</span>
            </div>
            Then add: update('motor_temp', data.motor_temp); in dashboard.js -->

        </section>

        <!-- ── Message Log ──────────────────────────────────────────────────────
             Scrollable box showing raw telemetry messages as they arrive.
             dashboard.js writes to #log-box via the log() helper function —
             it creates a <p> tag per message and prepends it (newest on top).
             Height and scroll behavior are controlled in style.css (#log-box). -->
        <section>
            <h2>Message Log</h2>
            <div id="log-box"></div>  <!-- dashboard.js fills this — do not add content here -->
        </section>

    </main>

    <!-- ── Scripts ─────────────────────────────────────────────────────────────
         Loaded at the BOTTOM of <body> so the HTML elements above exist in
         the DOM before the scripts try to access them by id.

         Load order matters:
           1. socket.io.min.js  — provides the io() function dashboard.js needs
           2. dashboard.js      — our code, which calls io() on its first line

         socket.io is loaded from a CDN (no install needed in the browser).
         dashboard.js is loaded via Flask's url_for, same as the stylesheet.  -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>
</html>
